<div class="search-container">
  <div class="model-selector">
    <label class="model-label" for="ai-model">Motor de Búsqueda:</label>
    <select id="ai-model" class="model-select" [(ngModel)]="selectedModel">
      <option value="VIT-L-14">VIT-L-14</option>
      <option value="VIT-B-32">VIT-B-32</option>
    </select>
  </div>

  <div class="mode-toggle">
    <label>
      <input 
        type="radio" 
        name="mode" 
        value="text" 
        [(ngModel)]="searchMode"
        (ngModelChange)="onModeChange()"
      > 
      Búsqueda Textual
    </label>
    <label>
      <input 
        type="radio" 
        name="mode" 
        value="image" 
        [(ngModel)]="searchMode"
        (ngModelChange)="onModeChange()"
      > 
      Búsqueda por Imagen
    </label>
  </div>
  
  <div class="input-area">
    <ng-container *ngIf="searchMode === 'text'">
      <input 
        type="text" 
        class="search-input" 
        placeholder="Ej: cat / un gato" 
        [(ngModel)]="textQuery"
      >
    </ng-container>

    <ng-container *ngIf="searchMode === 'image'">
      <label class="file-upload-btn">
        Subir imagen de tu computadora
        <input 
          #fileInput
          type="file" 
          accept="image/*" 
          (change)="onFileSelected($event)" 
          hidden
        >
      </label>
      
      <div *ngIf="selectedFile" class="file-info">
        <span class="file-name">{{ selectedFile.name }}</span>
        <button class="clear-btn" (click)="clearSelection(fileInput)" title="Eliminar imagen">✖</button>
      </div>
    </ng-container>

    <button class="search-btn" (click)="onSearch()">Search</button>
  </div>

  <div class="results-grid" *ngIf="results.length > 0">
    <div class="result-card" *ngFor="let result of results">
      <img 
        [src]="result" 
        alt="Imagen similar" 
        class="result-img"
      >
    </div>
  </div>
</div>
